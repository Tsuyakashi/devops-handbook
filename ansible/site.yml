---
- name: 1. Common node configure & Tooling Installation
  hosts: all
  become: true
  tasks:
    - name: Disable SWAP
      command: swapoff -a
      when: ansible_swaptotal_mb > 0

    - name: Remove SWAP from fstab
      replace:
        path: /etc/fstab
        regexp: '^([^#].*?\sswap\s+.*)$'
        replace: '# \1'

    - name: Load kernel modules
      modprobe:
        name: "{{ item }}"
        state: present
      loop: [overlay, br_netfilter]

    - name: Configure sysctl for Kubernetes
      sysctl:
        name: "{{ item.name }}"
        value: "{{ item.value }}"
        state: present
        sysctl_file: /etc/sysctl.d/k8s.conf
        reload: true
      loop:
        - { name: net.bridge.bridge-nf-call-iptables,  value: "1" }
        - { name: net.bridge.bridge-nf-call-ip6tables, value: "1" }
        - { name: net.ipv4.ip_forward,                 value: "1" }

    - name: Install containerd
      apt:
        name: containerd
        state: present
        update_cache: true

    - name: Create containerd config directory
      file:
        path: /etc/containerd
        state: directory
        mode: "0755"

    - name: Generate default containerd config
      shell: containerd config default > /etc/containerd/config.toml
      args:
        creates: /etc/containerd/config.toml

    - name: Configure containerd (SystemdCgroup + pause image)
      replace:
        path: /etc/containerd/config.toml
        regexp: "{{ item.regexp }}"
        replace: "{{ item.replace }}"
      loop:
        - { regexp: 'SystemdCgroup = false', replace: 'SystemdCgroup = true' }
        - { regexp: 'sandbox_image = "registry.k8s.io/pause:3.8"',
            replace: 'sandbox_image = "registry.k8s.io/pause:3.9"' }
      notify: Restart containerd

    - name: Add Kubernetes APT key
      apt_key:
        url: https://pkgs.k8s.io/core:/stable:/v1.30/deb/Release.key
        state: present
        keyring: /etc/apt/keyrings/kubernetes-apt-keyring.gpg

    - name: Add Kubernetes APT repository
      apt_repository:
        repo: "deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v1.30/deb/ /"
        state: present
        filename: kubernetes

    - name: Install kubelet, kubeadm, kubectl
      apt:
        name: [kubelet, kubeadm, kubectl]
        state: present
        update_cache: true

  handlers:
    - name: Restart containerd
      service:
        name: containerd
        state: restarted

- name: 2. Install Helm on master
  hosts: masters
  become: true
  tasks:
    - name: Download Helm archive
      get_url:
        url: https://get.helm.sh/helm-v3.14.4-linux-amd64.tar.gz
        dest: /tmp/helm.tar.gz
        mode: "0644"

    - name: Extract Helm archive
      unarchive:
        src: /tmp/helm.tar.gz
        dest: /tmp/
        remote_src: true

    - name: Install Helm binary
      copy:
        src: /tmp/linux-amd64/helm
        dest: /usr/local/bin/helm
        remote_src: true
        owner: root
        group: root
        mode: "0755"

- name: 3. Initialize Control Plane
  hosts: masters
  become: true
  tasks:
    - name: Run kubeadm init
      command: >
        kubeadm init
        --apiserver-advertise-address={{ ansible_host }}
        --pod-network-cidr=10.244.0.0/16
      args:
        creates: /etc/kubernetes/admin.conf

    - name: Create .kube directory for vagrant user
      file:
        path: /home/vagrant/.kube
        state: directory
        owner: vagrant
        group: vagrant
        mode: "0755"

    - name: Copy admin.conf for vagrant user
      copy:
        src: /etc/kubernetes/admin.conf
        dest: /home/vagrant/.kube/config
        remote_src: true
        owner: vagrant
        group: vagrant
        mode: "0600"

    - name: Install Flannel CNI
      become: false
      command: kubectl apply -f https://github.com/flannel-io/flannel/releases/latest/download/kube-flannel.yml
      args:
        creates: /etc/cni/net.d/10-flannel.conflist

    - name: Generate worker join command
      command: kubeadm token create --print-join-command
      register: join_command_raw

    # Сохраняем в fact, чтобы был доступен в следующем play
    - name: Set join command as host fact
      set_fact:
        join_command: "{{ join_command_raw.stdout }}"

- name: 4. Join Worker Nodes
  hosts: workers
  become: true
  tasks:
    - name: Join worker to cluster
      command: "{{ hostvars['master']['join_command'] }}"
      args:
        creates: /etc/kubernetes/kubelet.conf

- name: 5. Deploy ArgoCD & Ingress NGINX
  hosts: masters
  become: false
  tasks:
    - name: Add Helm repositories
      command: helm repo add {{ item.name }} {{ item.url }}
      loop:
        - { name: argo,          url: "https://argoproj.github.io/argo-helm" }
        - { name: ingress-nginx, url: "https://kubernetes.github.io/ingress-nginx" }
      # repo add падает если репо уже есть — это не ошибка
      register: repo_result
      changed_when: "'already exists' not in repo_result.stderr"
      failed_when:
        - repo_result.rc != 0
        - "'already exists' not in repo_result.stderr"

    - name: Update Helm repositories
      command: helm repo update

    - name: Create namespaces
      command: kubectl create namespace {{ item }}
      loop: [argocd, ingress-nginx]
      register: ns_result
      changed_when: ns_result.rc == 0
      failed_when:
        - ns_result.rc != 0
        - "'AlreadyExists' not in ns_result.stderr"
   
    - name: Install ArgoCD    
      command: >
        helm upgrade --install argocd argo/argo-cd
        --namespace argocd
        --set server.ingress.enabled=true
        --set server.ingress.ingressClassName=nginx
        --set server.ingress.hostname=argocd.local
        --set server.ingress.annotations."nginx\.ingress\.kubernetes\.io/ssl-passthrough"=true
        --set server.ingress.annotations."nginx\.ingress\.kubernetes\.io/backend-protocol"=HTTPS
        --wait --timeout 10m

    - name: Install Ingress NGINX
      command: >
        helm upgrade --install ingress-nginx ingress-nginx/ingress-nginx
        --namespace ingress-nginx
        --set controller.service.type=NodePort
        --set controller.service.nodePorts.http=30080
        --set controller.service.nodePorts.https=30443
        --wait --timeout 10m