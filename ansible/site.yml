---
- name: 1. Common node configure & Tooling Installation
  hosts: all
  become: true
  tasks:
    - name: Disable SWAP
      command: swapoff -a
      when: ansible_swaptotal_mb > 0

    - name: Remove SWAP from fstab
      replace:
        path: /etc/fstab
        regexp: '^([^#].*?\sswap\s+.*)$'
        replace: '# \1'

    - name: Load kernel modules
      modprobe:
        name: "{{ item }}"
        state: present
      loop: [overlay, br_netfilter]

    - name: Persist kernel modules across reboots
      copy:
        dest: /etc/modules-load.d/k8s.conf
        content: |
          overlay
          br_netfilter

    - name: Configure sysctl for Kubernetes
      sysctl:
        name: "{{ item.name }}"
        value: "{{ item.value }}"
        state: present
        sysctl_file: /etc/sysctl.d/k8s.conf
        reload: true
      loop:
        - { name: net.bridge.bridge-nf-call-iptables,  value: "1" }
        - { name: net.bridge.bridge-nf-call-ip6tables, value: "1" }
        - { name: net.ipv4.ip_forward,                 value: "1" }

    - name: Install containerd
      apt:
        name: containerd
        state: present
        update_cache: true

    - name: Create containerd config directory
      file:
        path: /etc/containerd
        state: directory
        mode: "0755"

    - name: Deploy containerd config from template
      template:
        src: containerd-config.toml.j2
        dest: /etc/containerd/config.toml
        owner: root
        group: root
        mode: "0644"
      notify: Restart containerd

    - name: Add Kubernetes APT key
      apt_key:
        url: "https://pkgs.k8s.io/core:/stable:/v{{ k8s_version }}/deb/Release.key"
        state: present
        keyring: /etc/apt/keyrings/kubernetes-apt-keyring.gpg

    - name: Add Kubernetes APT repository
      apt_repository:
        repo: "deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v{{ k8s_version }}/deb/ /"
        state: present
        filename: kubernetes

    - name: Install kubelet, kubeadm, kubectl
      apt:
        name: [kubelet, kubeadm, kubectl]
        state: present
        update_cache: true

  handlers:
    - name: Restart containerd
      service:
        name: containerd
        state: restarted

- name: 2. Install Helm on master
  hosts: master_primary
  become: true
  tasks:
    - name: Download Helm archive
      get_url:
        url: "https://get.helm.sh/helm-v{{ helm_version }}-linux-amd64.tar.gz"
        dest: /tmp/helm.tar.gz
        mode: "0644"

    - name: Extract Helm archive
      unarchive:
        src: /tmp/helm.tar.gz
        dest: /tmp/
        remote_src: true

    - name: Install Helm binary
      copy:
        src: /tmp/linux-amd64/helm
        dest: /usr/local/bin/helm
        remote_src: true
        owner: root
        group: root
        mode: "0755"

- name: 3. Configure keepalived on masters
  hosts: masters
  become: true
  tasks:
    - name: Install keepalived
      apt:
        name: keepalived
        state: present
        update_cache: true

    - name: Deploy keepalived config from template
      template:
        src: keepalived.conf.j2
        dest: /etc/keepalived/keepalived.conf
        owner: root
        group: root
        mode: "0644"
      notify: Restart keepalived

  handlers:
    - name: Restart keepalived
      service:
        name: keepalived
        state: restarted

- name: 4. Initialize Control Plane (primary master)
  hosts: master_primary
  become: true
  tasks:
    - name: Deploy kubeadm config template
      template:
        src: kubeadm-config.yaml.j2
        dest: /tmp/kubeadm-config.yaml
        mode: "0600"
      args:
        creates: /etc/kubernetes/admin.conf

    - name: Run kubeadm init with config file
      command: >
        kubeadm init 
        --config=/tmp/kubeadm-config.yaml 
        --upload-certs 
        --ignore-preflight-errors=NumCPU,Mem
      args:
        creates: /etc/kubernetes/admin.conf

    - name: Create .kube directory for vagrant user
      file:
        path: /home/vagrant/.kube
        state: directory
        owner: vagrant
        group: vagrant
        mode: "0755"

    - name: Copy admin.conf for vagrant user
      copy:
        src: /etc/kubernetes/admin.conf
        dest: /home/vagrant/.kube/config
        remote_src: true
        owner: vagrant
        group: vagrant
        mode: "0600"

    - name: Install Flannel CNI
      become: false
      command: kubectl apply -f https://github.com/flannel-io/flannel/releases/latest/download/kube-flannel.yml
      args:
        creates: /etc/cni/net.d/10-flannel.conflist

    - name: Generate join command for workers
      command: kubeadm token create --print-join-command
      register: worker_join_raw

    - name: Save worker join command
      copy:
        content: "{{ worker_join_raw.stdout }}"
        dest: /tmp/worker-join.sh
        mode: "0755"

    - name: Upload certs and capture certificate key
      shell: kubeadm init phase upload-certs --upload-certs 2>/dev/null | tail -1
      register: cert_key_raw

    - name: Generate join command for control plane nodes
      command: "kubeadm token create --print-join-command --certificate-key {{ cert_key_raw.stdout | trim }}"
      register: cp_join_raw

    - name: Save control plane join command
      copy:
        content: "{{ cp_join_raw.stdout }}"
        dest: /tmp/cp-join.sh
        mode: "0755"

- name: 5. Join secondary masters
  hosts: master_secondary
  become: true
  serial: 1
  tasks:
    - name: Read control plane join command
      slurp:
        src: /tmp/cp-join.sh
      delegate_to: master-1
      register: cp_join_file

    - name: Join as control plane node
      shell: >
        {{ cp_join_file.content | b64decode | trim }}
        --apiserver-advertise-address={{ ansible_host }}
        --ignore-preflight-errors=NumCPU,Mem
      args:
        creates: /etc/kubernetes/admin.conf

    - name: Create .kube directory for vagrant user
      file:
        path: /home/vagrant/.kube
        state: directory
        owner: vagrant
        group: vagrant
        mode: "0755"

    - name: Copy admin.conf for vagrant user
      copy:
        src: /etc/kubernetes/admin.conf
        dest: /home/vagrant/.kube/config
        remote_src: true
        owner: vagrant
        group: vagrant
        mode: "0600"

- name: 6. Join Worker Nodes
  hosts: workers
  become: true
  tasks:
    - name: Read worker join command
      slurp:
        src: /tmp/worker-join.sh
      delegate_to: master-1
      register: join_command_file

    - name: Join worker to cluster
      command: "{{ join_command_file.content | b64decode | trim }}"
      args:
        creates: /etc/kubernetes/kubelet.conf

- name: 7. Install Local Path Provisioner
  hosts: master_primary
  become: false
  tasks:
    - name: Apply local-path-provisioner manifest
      command: >
        kubectl apply -f
        https://raw.githubusercontent.com/rancher/local-path-provisioner/master/deploy/local-path-storage.yaml
      args:
        creates: /etc/local-path-provisioner-installed

    - name: Wait for local-path-provisioner to be ready
      command: >
        kubectl -n local-path-storage wait
        --for=condition=ready pod
        -l app=local-path-provisioner
        --timeout=120s

    - name: Mark local-path as default StorageClass
      command: >
        kubectl patch storageclass local-path
        -p '{"metadata":{"annotations":{"storageclass.kubernetes.io/is-default-class":"true"}}}'

- name: 8. Deploy ArgoCD & Ingress NGINX
  hosts: master_primary
  become: false
  tasks:
    - name: Install pip3
      become: true
      apt:
        name: python3-pip
        state: present
        update_cache: true

    - name: Install kubernetes Python library
      become: true
      pip:
        name: kubernetes
        state: present
        extra_args: "--break-system-packages --ignore-installed PyYAML"

    - name: Create namespaces
      kubernetes.core.k8s:
        name: "{{ item }}"
        api_version: v1
        kind: Namespace
        state: present
      loop: [argocd, ingress-nginx]

    - name: Add Helm repositories
      kubernetes.core.helm_repository:
        name: "{{ item.name }}"
        repo_url: "{{ item.url }}"
        state: present
      loop:
        - { name: argo,          url: "https://argoproj.github.io/argo-helm" }
        - { name: ingress-nginx, url: "https://kubernetes.github.io/ingress-nginx" }

    - name: Install ArgoCD
      kubernetes.core.helm:
        name: argocd
        chart_ref: argo/argo-cd
        chart_version: "7.3.8"
        release_namespace: argocd
        update_repo_cache: true
        values:
          server:
            ingress:
              enabled: true
              ingressClassName: nginx
              hostname: argocd.local
              annotations:
                nginx.ingress.kubernetes.io/ssl-passthrough: "true"
                nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"

    - name: Install Ingress NGINX
      kubernetes.core.helm:
        name: ingress-nginx
        chart_ref: ingress-nginx/ingress-nginx
        release_namespace: ingress-nginx
        update_repo_cache: true
        values:
          controller:
            service:
              type: NodePort
              nodePorts:
                http: 30080
                https: 30443

- name: 9. Configure ArgoCD Repository & Root Application
  hosts: master_primary
  become: false
  tasks:
    - name: Create GitHub Secret for ArgoCD Private Repo
      no_log: true
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: github-private-repo-creds
            namespace: argocd
            labels:
              argocd.argoproj.io/secret-type: repository
          stringData:
            type: git
            url: "https://github.com/{{ github_user }}/{{ github_repo }}.git"
            username: "{{ github_user }}"
            password: "{{ github_token }}"

    - name: Deploy Root Application (App of Apps)
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: argoproj.io/v1alpha1
          kind: Application
          metadata:
            name: root-app
            namespace: argocd
          spec:
            project: default
            source:
              repoURL: "https://github.com/{{ github_user }}/{{ github_repo }}.git"
              targetRevision: HEAD
              path: apps/applications
            destination:
              server: 'https://kubernetes.default.svc'
              namespace: argocd
            syncPolicy:
              automated:
                prune: true
                selfHeal: true
