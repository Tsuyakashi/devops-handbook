---
- name: 1. Common node configure & Tooling Installation
  hosts: all
  become: true
  tasks:
    - name: switch off SWAP
      command: swapoff -a
      when: ansible_swaptotal_mb > 0

    - name: delete SWAP from fstab
      replace:
        path: /etc/fstab
        regexp: '^([^#].*?\sswap\s+.*)$'
        replace: '# \1'

    - name: load kernel modules
      modprobe:
        name: "{{ item }}"
        state: present
      loop: [ 'overlay', 'br_netfilter' ]
    
    - name: configure sysctl for iptables & forwarding 
      sysctl:
        name: "{{ item.name }}"
        value: "{{ item.value }}"
        state: present
        sysctl_file: /etc/sysctl.d/k8s.conf
        reload: true
      loop:
        - { name: 'net.bridge.bridge-nf-call-iptables', value: '1' }
        - { name: 'net.bridge.bridge-nf-call-ip6tables', value: '1' }
        - { name: 'net.ipv4.ip_forward', value: '1' }
      
    - name: install containerd
      apt:
        name: containerd
        state: present
        update_cache: true
    
    - name: create dir for containerd config
      file:
        path: /etc/containerd
        state: directory
        mode: '0755'

    - name: generate default containerd config
      shell: containerd config default > /etc/containerd/config.toml
      args:
        creates: /etc/containerd/config.toml

    - name: turn on SystemCgroup & fix sandbox image in containerd
      replace:
        path: /etc/containerd/config.toml
        regexp: "{{ item.regexp }}"
        replace: "{{ item.replace }}"
      loop:
        - { regexp: 'SystemdCgroup = false', replace: 'SystemdCgroup = true' }
        - { regexp: 'sandbox_image = "registry.k8s.io/pause:3.8"', replace: 'sandbox_image = "registry.k8s.io/pause:3.9"' }
      notify: Restart containerd

    - name: add GPG kubernetes repository key
      apt_key:
        url: https://pkgs.k8s.io/core:/stable:/v1.30/deb/Release.key
        state: present
        keyring: /etc/apt/keyrings/kubernetes-apt-keyring.gpg

    - name: add official kubernetes apt repository
      apt_repository:
        repo: "deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v1.30/deb/ /"
        state: present
        filename: kubernetes

    - name: install kubelet, kubeadm, kubectl
      apt:
        name: "{{ item }}"
        state: present
        update_cache: true
      loop: [ 'kubelet', 'kubeadm', 'kubectl' ]

    # Ставим Helm на все ноды (лишним не будет, зато логика чище)
    - name: download Helm binary archive
      get_url:
        url: https://get.helm.sh/helm-v3.14.4-linux-amd64.tar.gz
        dest: /tmp/helm.tar.gz
        mode: '0644'
      when: inventory_hostname in groups['masters']

    - name: create temporary directory for extraction
      file:
        path: /tmp/helm-extracted
        state: directory
        mode: '0755'
      when: inventory_hostname in groups['masters']

    - name: unarchive Helm binary
      unarchive:
        src: /tmp/helm.tar.gz
        dest: /tmp/helm-extracted
        remote_src: true
      when: inventory_hostname in groups['masters']

    - name: move Helm binary to system bin path
      copy:
        src: /tmp/helm-extracted/linux-amd64/helm
        dest: /usr/local/bin/helm
        remote_src: true
        owner: root
        group: root
        mode: '0755'
      when: inventory_hostname in groups['masters']

  handlers:
    - name: Restart containerd
      service:
        name: containerd
        state: restarted

- name: 2. Initialize Control Plane (master node)
  hosts: masters
  become: true
  tasks:
    - name: run kubeadm init
      command: kubeadm init --apiserver-advertise-address=192.168.56.10 --pod-network-cidr=10.244.0.0/16
      args:
        creates: /etc/kubernetes/admin.conf

    - name: create .kube dir for vagrant user
      file:
        path: /home/vagrant/.kube
        state: directory
        owner: vagrant
        group: vagrant
        mode: '0755'

    - name: copy admin.conf in vagrant user home dir
      copy:
        src: /etc/kubernetes/admin.conf
        dest: /home/vagrant/.kube/config
        remote_src: true
        owner: vagrant
        group: vagrant
        mode: '0600'

    - name: install network plugin Flannel CNI
      become: false
      command: kubectl apply -f https://github.com/flannel-io/flannel/releases/latest/download/kube-flannel.yml
      args:
        creates: /etc/cni/net.d/10-flannel.conflist

    - name: generate command to connect workers
      command: kubeadm token create --print-join-command
      register: join_command_raw

- name: 3. Connecting Worker Nodes to Cluster
  hosts: workers
  become: true
  tasks:
    - name: connect worker to cluster
      command: "{{ hostvars['master']['join_command_raw']['stdout'] }}"
      args:
        creates: /etc/kubernetes/kubelet.conf 

- name: 4. Deploy Infrastructure (ArgoCD & Ingress)
  hosts: masters
  become: false # Работаем от имени пользователя vagrant
  tasks:
    - name: add Helm repositories inside master
      command: "helm repo add {{ item.name }} {{ item.url }}"
      loop:
        - { name: 'argo', url: 'https://argoproj.github.io/argo-helm' }
        - { name: 'ingress-nginx', url: 'https://kubernetes.github.io/ingress-nginx' }
      failed_when: false 

    - name: update Helm repositories
      command: helm repo update

    - name: create namespaces for infra
      command: "kubectl create namespace {{ item }}"
      loop: [ 'argocd', 'ingress-nginx' ]
      failed_when: false 

    - name: create temporary values file for ArgoCD
      copy:
        dest: /tmp/argocd-values.yaml
        content: |
          server:
            ingress:
              enabled: true
              ingressClassName: nginx
              hostname: argocd.local
              annotations:
                nginx.ingress.kubernetes.io/ssl-passthrough: "true"
                nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"

    - name: install ArgoCD via Helm CLI using values file
      command: >
        helm upgrade --install argocd argo/argo-cd 
        --namespace argocd 
        -f /tmp/argocd-values.yaml
        --wait --timeout 10m

    - name: install Ingress NGINX via Helm CLI
      command: >
        helm upgrade --install ingress-nginx ingress-nginx/ingress-nginx 
        --namespace ingress-nginx 
        --set controller.service.type=NodePort 
        --set controller.service.nodePorts.http=30080 
        --set controller.service.nodePorts.https=30443
        --wait --timeout 10m