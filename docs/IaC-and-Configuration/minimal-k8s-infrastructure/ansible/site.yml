- name: common node configure
  hosts: all
  become: true
  tasks:
    - name: switch off SWAP
      command: swapoff -a
      when: ansible_swaptotal_mb > 0

    - name: delete SWAP from fstab
      replace:
        path: /etc/fstab
        regexp: '^([^#].*?\sswap\s+.*)$'
        replace: '# \1'

    - name: load kernel modules
      modprobe:
        name: "{{ item }}"
        state: present
      loop: [ 'overlay', 'br_netfilter' ]
    
    - name: configure sysctl for iptables & forwarding 
      sysctl:
        name: "{{ item.name }}"
        value: "{{ item.value }}"
        state: present
        sysctl_file: /etc/sysctl.d/k8s.conf
        reload: true
      loop:
        - { name: 'net.bridge.bridge-nf-call-iptables', value: '1' }
        - { name: 'net.bridge.bridge-nf-call-ip6tables', value: '1' }
        - { name: 'net.ipv4.ip_forward', value: '1' }
      
    - name: install containerd
      apt:
        name: containerd
        state: present
        update_cache: true
    
    - name: create dir for containerd config
      file:
        path: /etc/containerd
        state: directory
        mode: '0755'

    - name: generate default containerd config
      shell: containerd config default > /etc/containerd/config.toml
      args:
        creates: /etc/containerd/config.toml

    - name: turn on SystemCgroup & fix sandbox image in containerd
      replace:
        path: /etc/containerd/config.toml
        regexp: "{{ item.regexp }}"
        replace: "{{ item.replace }}"
      loop:
        - { regexp: 'SystemdCgroup = false', replace: 'SystemdCgroup = true' }
        - { regexp: 'sandbox_image = "registry.k8s.io/pause:3.8"', replace: 'sandbox_image = "registry.k8s.io/pause:3.9"' }
      notify: Restart containerd

    - name: add GPG kubernetes repository key
      apt_key:
        url: https://pkgs.k8s.io/core:/stable:/v1.30/deb/Release.key
        state: present
        keyring: /etc/apt/keyrings/kubernetes-apt-keyring.gpg

    - name: add official kubernetes apt repository
      apt_repository:
        repo: "deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v1.30/deb/ /"
        state: present
        filename: kubernetes

    - name: install kubelet, kubeadm, kubectl
      apt:
        name: "{{ item }}"
        state: present
        update_cache: true
      loop: [ 'kubelet', 'kubeadm', 'kubectl' ]
  
  handlers:
    - name: Restart containerd
      service:
        name: containerd
        state: restarted

- name: initialize Control Plane (master node)
  hosts: masters
  become: true
  tasks:
    - name: run kubeadm init
      command: kubeadm init --apiserver-advertise-address=192.168.56.10 --pod-network-cidr=10.244.0.0/16
      args:
        creates: /etc/kubernetes/admin.conf

    - name: create .kube dir for vagrant user
      file:
        path: /home/vagrant/.kube
        state: directory
        owner: vagrant
        group: vagrant
        mode: '0755'

    - name: copy admin.conf in vagrant user home dir
      copy:
        src: /etc/kubernetes/admin.conf
        dest: /home/vagrant/.kube/config
        remote_src: true
        owner: vagrant
        group: vagrant
        mode: '0600'

    - name: install network plugin Flannel CNI
      become: false # run as vagrant user, using it kubeconfig
      command: kubectl apply -f https://github.com/flannel-io/flannel/releases/latest/download/kube-flannel.yml
      args:
        creates: /etc/cni/net.d/10-flannel.conflist

    - name: generate command to connect workers
      command: kubeadm token create --print-join-command
      register: join_command_raw

- name: connecting worker nodes
  hosts: workers
  become: true
  tasks:
    - name: connect worker to cluster
      command: "{{ hostvars['master']['join_command_raw']['stdout'] }}"
      args:
        creates: /etc/kubernetes/kubelet.conf 