apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-web
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
  spec:
    containers:
    - name: nginx
      image: nginxdemos/hello:plain
      ports:
      - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: test-web-service
  namespace: default
spec:
  ports:
  - port: 80
    targetPort: 80
  selector:
    app: web
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: test-web-ingress
  namespace: default
spec:
  ingressClassName: nginx
  rules:
  - host: app.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: test-web-service
            port:
              number: 80
